services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: analytiq-db
    environment:
      POSTGRES_DB: analytiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - analytiq_db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: analytiq-redis
    ports:
      - "6380:6379"
    volumes:
      - analytiq_redis_data:/data

volumes:
  analytiq_db_data:
  analytiq_redis_data:
